<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26年NC台账管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 1400px;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .stat-label {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .table thead th {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 8px;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .table tbody td {
            padding: 10px 8px;
            font-size: 0.85rem;
            vertical-align: middle;
        }
        .table tbody tr:hover {
            background: #f3f4f6;
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
        }
        .modal-content {
            border-radius: 16px;
        }
        .search-box {
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            padding: 8px 12px;
            min-width: 200px;
        }
        .search-box:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 搜索高亮 */
        .highlight {
            background: #fef08a;
            padding: 1px 2px;
            border-radius: 2px;
        }
        /* Toast 提示 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            min-width: 250px;
        }
        /* 移动端优化 */
        @media (max-width: 768px) {
            .stat-card {
                margin-bottom: 10px;
            }
            .stat-number {
                font-size: 1.5rem;
            }
            .btn-group-mobile {
                flex-direction: column;
            }
            .search-box {
                width: 100%;
                margin-bottom: 10px;
            }
        }
        /* 虚拟滚动优化 */
        .table-wrapper {
            max-height: 60vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="text-center mb-3">
            <h2 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">
                <i class="bi bi-database"></i> 26年NC台账管理系统
            </h2>
            <p style="color: rgba(255,255,255,0.9); font-size: 0.9rem;">数据总览 · 统计分析 · 数据管理</p>
        </div>

        <!-- Toast 提示 -->
        <div class="toast-container">
            <div class="toast" id="toast">
                <div class="toast-header">
                    <strong class="me-auto" id="toastTitle">提示</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body" id="toastBody"></div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-3">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">-</div>
                    <div class="stat-label"><i class="bi bi-list-ol"></i> 总记录数</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalAmount" style="color: var(--danger-color);">-</div>
                    <div class="stat-label"><i class="bi bi-currency-yen"></i> 累计金额</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="unpaidCount" style="color: var(--warning-color);">-</div>
                    <div class="stat-label"><i class="bi bi-exclamation-circle"></i> 未回款</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="paidCount" style="color: var(--success-color);">-</div>
                    <div class="stat-label"><i class="bi bi-check-circle"></i> 已回款</div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card p-3">
                    <h6><i class="bi bi-pie-chart"></i> 异常情况分布</h6>
                    <canvas id="exceptionChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3">
                    <h6><i class="bi bi-bar-chart"></i> 责任方分布</h6>
                    <canvas id="responsibilityChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <!-- 数据操作区 -->
        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <h5><i class="bi bi-table"></i> 数据列表</h5>
                <div class="d-flex gap-2 flex-wrap btn-group-mobile">
                    <input type="text" class="search-box" id="searchInput" placeholder="搜索单号/商品/处理人...">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
                        <i class="bi bi-plus-circle"></i> 添加
                    </button>
                    <button class="btn btn-success" onclick="exportData()">
                        <i class="bi bi-download"></i> 导出
                    </button>
                </div>
            </div>
            
            <div class="table-container">
                <!-- 加载状态 -->
                <div class="loading" id="loadingState">
                    <div class="spinner"></div>
                    <p>加载数据中，请稍候...</p>
                    <small class="text-muted">首次访问可能需要等待 10-30 秒</small>
                </div>
                
                <!-- 表格内容 -->
                <div id="tableContent" style="display: none;">
                    <div style="overflow-x: auto;">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>班次</th>
                                    <th>包裹号</th>
                                    <th>商品详情</th>
                                    <th>异常</th>
                                    <th>金额</th>
                                    <th>责任方</th>
                                    <th>处理方式</th>
                                    <th>路由</th>
                                    <th>处理人</th>
                                    <th>回款</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="d-flex justify-content-between align-items-center p-3 border-top">
                        <div class="small">
                            共 <span id="pageTotal">0</span> 条，每页
                            <select id="pageSize" onchange="changePageSize()" class="form-select form-select-sm d-inline-block" style="width: auto;">
                                <option value="20">20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                            条
                            <span id="searchResult" class="ms-2 text-muted"></span>
                        </div>
                        <nav>
                            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加数据模态框 -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--primary-color); color: white;">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 添加新数据</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">日期 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="日期" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">班次</label>
                                <select class="form-select" name="班次">
                                    <option value="白班">白班</option>
                                    <option value="夜班">夜班</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">包裹号 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="包裹号" required placeholder="请输入完整包裹号">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">商品详情</label>
                                <input type="text" class="form-control" name="商品详情" placeholder="商品名称、规格等">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">异常情况</label>
                                <select class="form-select" name="异常情况">
                                    <option value="">请选择</option>
                                    <option value="破损">破损</option>
                                    <option value="破损1">破损1</option>
                                    <option value="破损2">破损2</option>
                                    <option value="丢失">丢失</option>
                                    <option value="少件">少件</option>
                                    <option value="错发">错发</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">金额(元)</label>
                                <input type="number" step="0.01" class="form-control" name="金额" placeholder="0.00">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">责任方</label>
                                <select class="form-select" name="责任方">
                                    <option value="NC">NC</option>
                                    <option value="验货">验货</option>
                                    <option value="卸车/NC共责">卸车/NC共责</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">处理方式</label>
                                <input type="text" class="form-control" name="处理方式" placeholder="如：修复下发、转账等">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">路由</label>
                                <select class="form-select" name="路由">
                                    <option value="已妥投">已妥投</option>
                                    <option value="已下发">已下发</option>
                                    <option value="处理中">处理中</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">处理人</label>
                                <input type="text" class="form-control" name="处理人" placeholder="负责人姓名">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">回款情况</label>
                                <select class="form-select" name="回款情况">
                                    <option value="">未回款</option>
                                    <option value="√">√ 已回款</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()" id="saveBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="saveSpinner"></span>
                        保存数据
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑数据模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background: var(--success-color); color: white;">
                    <h5 class="modal-title"><i class="bi bi-pencil"></i> 编辑数据</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm"></form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="updateData()" id="updateBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="updateSpinner"></span>
                        更新数据
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        let editingIndex = null;
        let exceptionChart = null;
        let responsibilityChart = null;
        let searchTimeout = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置今天日期为默认值
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('#addForm input[name="日期"]').value = today;
            
            // 防抖搜索
            document.getElementById('searchInput').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    renderTable();
                }, 300);
            });
            
            // 加载数据
            loadData();
        });

        // 显示提示
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toastTitle');
            const toastBody = document.getElementById('toastBody');
            
            toastTitle.textContent = title;
            toastBody.textContent = message;
            toast.className = `toast ${type === 'error' ? 'text-bg-danger' : 'text-bg-success'}`;
            
            new bootstrap.Toast(toast).show();
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error('网络错误');
                
                const data = await response.json();
                allData = data;
                filteredData = [...allData];
                
                // 隐藏加载，显示表格
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('tableContent').style.display = 'block';
                
                updateStats();
                renderTable();
                renderCharts();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-danger">
                        <i class="bi bi-exclamation-triangle" style="font-size: 2rem;"></i>
                        <p class="mt-2">加载失败: ${error.message}</p>
                        <button class="btn btn-primary btn-sm" onclick="loadData()">重试</button>
                    </div>
                `;
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allData.length;
            
            const totalAmount = allData.reduce((sum, item) => sum + (parseFloat(item['金额']) || 0), 0);
            document.getElementById('totalAmount').textContent = '¥' + totalAmount.toFixed(0);
            
            const unpaidCount = allData.filter(item => !item['回款情况'] || item['回款情况'] !== '√').length;
            document.getElementById('unpaidCount').textContent = unpaidCount;
            
            const paidCount = allData.filter(item => item['回款情况'] === '√').length;
            document.getElementById('paidCount').textContent = paidCount;
        }

        // 渲染表格
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const pageSize = parseInt(document.getElementById('pageSize').value);
            
            if (searchTerm) {
                filteredData = allData.filter(item => {
                    const searchFields = ['包裹号', '商品详情', '处理人', '责任方', '异常情况'];
                    return searchFields.some(field => 
                        String(item[field] || '').toLowerCase().includes(searchTerm)
                    );
                });
                document.getElementById('searchResult').textContent = `找到 ${filteredData.length} 条匹配`;
            } else {
                filteredData = [...allData];
                document.getElementById('searchResult').textContent = '';
            }
            
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map((item, index) => `
                <tr>
                    <td><small>${item['日期'] || ''}</small></td>
                    <td><span class="badge ${item['班次'] === '白班' ? 'bg-warning text-dark' : 'bg-info'}">${item['班次'] || '-'}</span></td>
                    <td><code style="font-size:0.8em;">${item['包裹号'] || ''}</code></td>
                    <td><small title="${item['商品详情'] || ''}">${truncate(item['商品详情'], 15)}</small></td>
                    <td><span class="badge bg-danger">${item['异常情况'] || '-'}</span></td>
                    <td><strong class="text-danger">¥${item['金额'] || '0'}</strong></td>
                    <td>${item['责任方'] || '-'}</td>
                    <td><small>${truncate(item['处理方式'], 8)}</small></td>
                    <td><span class="badge ${getRouteBadgeClass(item['路由'])}">${item['路由'] || '-'}</span></td>
                    <td>${item['处理人'] || '-'}</td>
                    <td>${item['回款情况'] === '√' ? '<span class="badge bg-success">✓</span>' : '<span class="badge bg-secondary">-</span>'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editData(${start + index})" title="编辑">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${start + index})" title="删除">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('pageTotal').textContent = filteredData.length;
            renderPagination(filteredData.length, pageSize);
        }

        function truncate(str, len) {
            if (!str) return '-';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        function getRouteBadgeClass(route) {
            switch(route) {
                case '已妥投': return 'bg-success';
                case '已下发': return 'bg-primary';
                case '处理中': return 'bg-warning text-dark';
                default: return 'bg-secondary';
            }
        }

        function changePageSize() {
            currentPage = 1;
            renderTable();
        }

        // 渲染分页
        function renderPagination(total, pageSize) {
            const totalPages = Math.ceil(total / pageSize);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            const pagination = document.getElementById('pagination');
            let html = '';
            
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="goPage(${currentPage - 1});return false;">‹</a>
            </li>`;
            
            const start = Math.max(1, currentPage - 2);
            const end = Math.min(totalPages, currentPage + 2);
            
            if (start > 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="goPage(1);return false;">1</a></li>`;
                if (start > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            }
            
            for (let i = start; i <= end; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="goPage(${i});return false;">${i}</a>
                </li>`;
            }
            
            if (end < totalPages) {
                if (end < totalPages - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                html += `<li class="page-item"><a class="page-link" href="#" onclick="goPage(${totalPages});return false;">${totalPages}</a></li>`;
            }
            
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="goPage(${currentPage + 1});return false;">›</a>
            </li>`;
            
            pagination.innerHTML = html;
        }

        function goPage(page) {
            const totalPages = Math.ceil(filteredData.length / parseInt(document.getElementById('pageSize').value));
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        }

        // 渲染图表
        function renderCharts() {
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#6366f1', '#14b8a6'];
            
            // 异常情况统计
            const exceptionCounts = {};
            allData.forEach(item => {
                const exp = item['异常情况'] || '未记录';
                exceptionCounts[exp] = (exceptionCounts[exp] || 0) + 1;
            });
            
            // 排序取前6
            const sortedExceptions = Object.entries(exceptionCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);
            
            if (exceptionChart) exceptionChart.destroy();
            exceptionChart = new Chart(document.getElementById('exceptionChart'), {
                type: 'doughnut',
                data: {
                    labels: sortedExceptions.map(e => e[0]),
                    datasets: [{
                        data: sortedExceptions.map(e => e[1]),
                        backgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } }
                    }
                }
            });
            
            // 责任方统计
            const respCounts = {};
            allData.forEach(item => {
                const resp = item['责任方'] || '未记录';
                respCounts[resp] = (respCounts[resp] || 0) + 1;
            });
            
            const sortedResp = Object.entries(respCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 6);
            
            if (responsibilityChart) responsibilityChart.destroy();
            responsibilityChart = new Chart(document.getElementById('responsibilityChart'), {
                type: 'bar',
                data: {
                    labels: sortedResp.map(r => r[0]),
                    datasets: [{
                        label: '数量',
                        data: sortedResp.map(r => r[1]),
                        backgroundColor: '#2563eb'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } } }
                }
            });
        }

        // 保存新数据
        async function saveData() {
            const form = document.getElementById('addForm');
            const formData = new FormData(form);
            const newData = {};
            
            formData.forEach((value, key) => {
                newData[key] = value;
            });
            
            // 验证必填
            if (!newData['包裹号']) {
                showToast('错误', '请填写包裹号', 'error');
                return;
            }
            
            // 显示加载
            const saveBtn = document.getElementById('saveBtn');
            const saveSpinner = document.getElementById('saveSpinner');
            saveBtn.disabled = true;
            saveSpinner.classList.remove('d-none');
            
            try {
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newData)
                });
                
                if (response.ok) {
                    showToast('成功', '数据已保存');
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    form.reset();
                    // 重置日期为今天
                    document.querySelector('#addForm input[name="日期"]').value = new Date().toISOString().split('T')[0];
                    loadData();
                } else {
                    showToast('错误', '保存失败，请重试', 'error');
                }
            } catch (error) {
                showToast('错误', '网络错误: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveSpinner.classList.add('d-none');
            }
        }

        // 编辑数据
        function editData(index) {
            const item = filteredData[index];
            editingIndex = allData.indexOf(item);
            
            const form = document.getElementById('editForm');
            const fields = ['日期', '班次', '包裹号', '商品详情', '异常情况', '金额', '责任方', '处理方式', '路由', '处理人', '回款情况'];
            
            form.innerHTML = `
                <div class="row">
                    ${fields.map(field => `
                        <div class="col-md-6 mb-3">
                            <label class="form-label">${field}</label>
                            ${field === '班次' ? `
                                <select class="form-select" name="${field}">
                                    <option value="白班" ${item[field] === '白班' ? 'selected' : ''}>白班</option>
                                    <option value="夜班" ${item[field] === '夜班' ? 'selected' : ''}>夜班</option>
                                </select>
                            ` : field === '路由' ? `
                                <select class="form-select" name="${field}">
                                    <option value="已妥投" ${item[field] === '已妥投' ? 'selected' : ''}>已妥投</option>
                                    <option value="已下发" ${item[field] === '已下发' ? 'selected' : ''}>已下发</option>
                                    <option value="处理中" ${item[field] === '处理中' ? 'selected' : ''}>处理中</option>
                                </select>
                            ` : field === '责任方' ? `
                                <select class="form-select" name="${field}">
                                    <option value="NC" ${item[field] === 'NC' ? 'selected' : ''}>NC</option>
                                    <option value="验货" ${item[field] === '验货' ? 'selected' : ''}>验货</option>
                                    <option value="卸车/NC共责" ${item[field] === '卸车/NC共责' ? 'selected' : ''}>卸车/NC共责</option>
                                    <option value="其他" ${item[field] === '其他' ? 'selected' : ''}>其他</option>
                                </select>
                            ` : field === '回款情况' ? `
                                <select class="form-select" name="${field}">
                                    <option value="" ${!item[field] ? 'selected' : ''}>未回款</option>
                                    <option value="√" ${item[field] === '√' ? 'selected' : ''}>√ 已回款</option>
                                </select>
                            ` : field === '异常情况' ? `
                                <select class="form-select" name="${field}">
                                    <option value="">请选择</option>
                                    <option value="破损" ${item[field] === '破损' ? 'selected' : ''}>破损</option>
                                    <option value="破损1" ${item[field] === '破损1' ? 'selected' : ''}>破损1</option>
                                    <option value="破损2" ${item[field] === '破损2' ? 'selected' : ''}>破损2</option>
                                    <option value="丢失" ${item[field] === '丢失' ? 'selected' : ''}>丢失</option>
                                    <option value="少件" ${item[field] === '少件' ? 'selected' : ''}>少件</option>
                                    <option value="错发" ${item[field] === '错发' ? 'selected' : ''}>错发</option>
                                    <option value="其他" ${item[field] === '其他' ? 'selected' : ''}>其他</option>
                                </select>
                            ` : `
                                <input type="${field === '日期' ? 'date' : field === '金额' ? 'number' : 'text'}" 
                                    class="form-control" name="${field}" 
                                    value="${item[field] || ''}"
                                    ${field === '包裹号' ? 'required' : ''}
                                    ${field === '金额' ? 'step="0.01"' : ''}>
                            `}
                        </div>
                    `).join('')}
                </div>
            `;
            
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // 更新数据
        async function updateData() {
            const form = document.getElementById('editForm');
            const formData = new FormData(form);
            const updatedData = {};
            
            formData.forEach((value, key) => {
                updatedData[key] = value;
            });
            
            const updateBtn = document.getElementById('updateBtn');
            const updateSpinner = document.getElementById('updateSpinner');
            updateBtn.disabled = true;
            updateSpinner.classList.remove('d-none');
            
            try {
                const response = await fetch(`/api/data/${editingIndex}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                
                if (response.ok) {
                    showToast('成功', '数据已更新');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadData();
                } else {
                    showToast('错误', '更新失败，请重试', 'error');
                }
            } catch (error) {
                showToast('错误', '网络错误: ' + error.message, 'error');
            } finally {
                updateBtn.disabled = false;
                updateSpinner.classList.add('d-none');
            }
        }

        // 删除数据
        async function deleteData(index) {
            if (!confirm('确定要删除这条记录吗？此操作不可恢复。')) return;
            
            const item = filteredData[index];
            const deleteIndex = allData.indexOf(item);
            
            try {
                const response = await fetch(`/api/data/${deleteIndex}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showToast('成功', '数据已删除');
                    loadData();
                } else {
                    showToast('错误', '删除失败，请重试', 'error');
                }
            } catch (error) {
                showToast('错误', '网络错误: ' + error.message, 'error');
            }
        }

        // 导出Excel
        function exportData() {
            showToast('提示', '正在生成Excel文件...');
            window.location.href = '/api/export';
        }
    </script>
</body>
</html>
