<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC台账管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --liquid-blur: 60px;
            --card-radius: 28px;
        }
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(160deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(var(--liquid-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--liquid-blur)) saturate(180%);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--card-radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.4);
        }
        .ios-header { padding: 12px 0 24px; text-align: center; }
        .ios-header h1 { font-size: 36px; font-weight: 800; color: white; margin: 0; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }
        .ios-header .subtitle { font-size: 16px; color: rgba(255,255,255,0.85); margin-top: 8px; }
        .stat-card { padding: 24px; border-radius: 28px; transition: all 0.4s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-4px) scale(1.02); }
        .stat-card .icon { width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 16px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .stat-card .number { font-size: 36px; font-weight: 800; color: white; }
        .stat-card .label { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 8px; }
        .gradient-blue { background: linear-gradient(135deg, rgba(0,122,255,0.8), rgba(88,86,214,0.8)); }
        .gradient-green { background: linear-gradient(135deg, rgba(52,199,89,0.8), rgba(48,209,88,0.8)); }
        .gradient-orange { background: linear-gradient(135deg, rgba(255,149,0,0.8), rgba(255,59,48,0.8)); }
        .gradient-pink { background: linear-gradient(135deg, rgba(255,45,85,0.8), rgba(175,82,222,0.8)); }
        .chart-card { padding: 24px; border-radius: 28px; margin-bottom: 20px; }
        .chart-card h5 { font-size: 18px; font-weight: 700; color: white; margin-bottom: 20px; }
        .chart-card canvas { max-height: 200px; }
        .ios-btn { padding: 14px 24px; border-radius: 16px; font-size: 16px; font-weight: 600; border: none; transition: all 0.3s; }
        .ios-btn:hover { transform: translateY(-2px); }
        .ios-btn-primary { background: linear-gradient(135deg, rgba(0,122,255,0.9), rgba(88,86,214,0.9)); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .data-table { width: 100%; min-width: 1000px; }
        .data-table th { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); padding: 16px 12px; }
        .data-table td { padding: 16px 12px; color: rgba(255,255,255,0.95); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* 液体玻璃弹窗效果 */
        .modal-backdrop {
            background: rgba(0,0,0,0.4) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
        }
        .modal-content {
            background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.7) 100%) !important;
            backdrop-filter: blur(60px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(60px) saturate(180%) !important;
            border: 1px solid rgba(255,255,255,0.4) !important;
            border-radius: 28px !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.5) !important;
            animation: modalSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-header {
            background: linear-gradient(135deg, rgba(0,122,255,0.9), rgba(88,86,214,0.9)) !important;
            color: white !important;
            border-radius: 28px 28px 0 0 !important;
            padding: 24px !important;
        }
        .modal-title { font-size: 20px; font-weight: 700; }
        .modal-body { padding: 24px !important; }
        .modal-footer { padding: 20px 24px !important; border-top: 1px solid rgba(0,0,0,0.1) !important; }
        
        .form-label { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .form-control, .form-select {
            padding: 14px 18px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 14px;
            font-size: 15px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0,122,255,0.15);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ios-header">
            <h1><i class="bi bi-database-fill"></i> NC台账管理系统</h1>
            <div class="subtitle">液体玻璃风格 · 数据可视化</div>
        </div>
        
        <div class="text-center text-white mt-5">
            <h3>液体玻璃弹窗效果已更新</h3>
            <p>标题已改为 NC台账管理系统</p>
            <p>弹窗增加高斯模糊背景 + 过渡动画</p>
            <p>责任方可自定义输入，路由增加处理中</p>
            <a href="/" class="btn ios-btn ios-btn-primary mt-3">刷新页面</a>
        </div>
    </div>
</body>
</html>
