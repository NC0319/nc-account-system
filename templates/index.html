<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26年NC台账管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --radius: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 标题 */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
            padding: 24px;
        }
        .page-header h1 {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .page-header p {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card.danger::before { background: var(--danger); }
        .stat-card.warning::before { background: var(--warning); }
        .stat-card.success::before { background: var(--success); }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 1.5rem;
        }
        .stat-card .stat-icon { background: #eef2ff; color: var(--primary); }
        .stat-card.danger .stat-icon { background: #fef2f2; color: var(--danger); }
        .stat-card.warning .stat-icon { background: #fffbeb; color: var(--warning); }
        .stat-card.success .stat-icon { background: #ecfdf5; color: var(--success); }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }
        .stat-label {
            color: var(--gray-500);
            font-size: 0.875rem;
        }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .chart-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-100);
        }
        .chart-header i {
            width: 36px;
            height: 36px;
            background: #eef2ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }
        .chart-header h5 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-700);
            margin: 0;
        }
        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
        }
        
        /* 操作栏 */
        .toolbar {
            background: white;
            border-radius: var(--radius);
            padding: 16px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #047857; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-600); }
        .btn-outline:hover { background: var(--gray-50); }
        .btn-outline-primary { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline-primary:hover { background: #eef2ff; }
        .btn-outline-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-outline-danger:hover { background: #fef2f2; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; }
        
        /* 表格 */
        .table-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
        }
        .data-table th {
            background: var(--gray-50);
            color: var(--gray-600);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 12px;
            text-align: left;
            border-bottom: 2px solid var(--gray-200);
            white-space: nowrap;
        }
        .data-table td {
            padding: 14px 12px;
            font-size: 0.9rem;
            color: var(--gray-700);
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }
        .data-table tbody tr {
            transition: background 0.15s;
        }
        .data-table tbody tr:hover {
            background: var(--gray-50);
        }
        .text-truncate {
            max-width: 160px;
            display: inline-block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .amount {
            font-weight: 600;
            color: var(--danger);
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-day { background: #fef3c7; color: #92400e; }
        .badge-night { background: #dbeafe; color: #1e40af; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        .badge-unpaid { background: var(--gray-100); color: var(--gray-500); }
        
        /* 分页 */
        .table-footer {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--gray-100);
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-info {
            color: var(--gray-500);
            font-size: 0.9rem;
        }
        .page-size-select {
            padding: 6px 10px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 0.9rem;
            margin: 0 4px;
        }
        .pagination {
            display: flex;
            gap: 4px;
        }
        .page-link {
            padding: 8px 14px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        .page-link:hover { background: var(--gray-50); border-color: var(--gray-300); }
        .page-item.active .page-link { background: var(--primary); color: white; border-color: var(--primary); }
        .page-item.disabled .page-link { color: var(--gray-300); pointer-events: none; }
        
        /* 模态框 */
        .modal-content {
            border-radius: 16px;
            border: none;
            overflow: hidden;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
        }
        .modal-header.bg-primary {
            background: var(--primary) !important;
            color: white;
        }
        .modal-header.bg-success {
            background: var(--success) !important;
            color: white;
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-100);
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .form-control::placeholder { color: var(--gray-400); }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 16px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--gray-500); font-size: 0.95rem; }
        
        /* Toast */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: white;
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            min-width: 200px;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast i { font-size: 1.2rem; }
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-card { padding: 16px; }
            .stat-value { font-size: 1.5rem; }
            .page-header h1 { font-size: 1.5rem; }
            .toolbar { flex-direction: column; }
            .search-box { width: 100%; }
            .table-footer { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 加载状态 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">加载中...</div>
        </div>
        
        <!-- 标题 -->
        <div class="page-header">
            <h1><i class="bi bi-database-fill"></i> 26年NC台账管理系统</h1>
            <p>数据总览 · 统计分析 · 快速检索</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="bi bi-list-ol"></i></div>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-icon"><i class="bi bi-currency-yen"></i></div>
                <div class="stat-value" id="totalAmount">0</div>
                <div class="stat-label">累计金额(元)</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-icon"><i class="bi bi-exclamation-circle"></i></div>
                <div class="stat-value" id="unpaidCount">0</div>
                <div class="stat-label">未回款</div>
            </div>
            <div class="stat-card success">
                <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
                <div class="stat-value" id="paidCount">0</div>
                <div class="stat-label">已回款</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <i class="bi bi-pie-chart"></i>
                    <h5>异常情况分布</h5>
                </div>
                <div class="chart-container">
                    <canvas id="exceptionChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <i class="bi bi-bar-chart"></i>
                    <h5>责任方分布</h5>
                </div>
                <div class="chart-container">
                    <canvas id="responsibilityChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="toolbar">
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="搜索包裹号/商品详情/处理人...">
            </div>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="bi bi-plus-lg"></i> 添加数据
            </button>
            <button class="btn btn-success" onclick="exportData()">
                <i class="bi bi-download"></i> 导出Excel
            </button>
        </div>

        <!-- 数据表格 -->
        <div class="table-card">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>班次</th>
                            <th>包裹号</th>
                            <th>商品详情</th>
                            <th>异常情况</th>
                            <th>金额</th>
                            <th>责任方</th>
                            <th>处理方式</th>
                            <th>路由</th>
                            <th>处理人</th>
                            <th>回款</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="table-footer">
                <div class="page-info">
                    共 <strong id="pageTotal">0</strong> 条记录，每页
                    <select class="page-size-select" id="pageSize" onchange="renderTable()">
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    条
                </div>
                <nav>
                    <ul class="pagination" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- 添加模态框 -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 添加新数据</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">日期 <span style="color:var(--danger)">*</span></label>
                                    <input type="date" class="form-control" name="日期" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">班次</label>
                                    <select class="form-select" name="班次">
                                        <option value="白班">白班</option>
                                        <option value="夜班">夜班</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">包裹号 <span style="color:var(--danger)">*</span></label>
                                    <input type="text" class="form-control" name="包裹号" required placeholder="输入包裹单号">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">商品详情</label>
                                    <input type="text" class="form-control" name="商品详情" placeholder="商品名称/描述">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">异常情况</label>
                                    <input type="text" class="form-control" name="异常情况" placeholder="如：破损1、丢失等">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">金额(元)</label>
                                    <input type="number" step="0.01" class="form-control" name="金额" placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">责任方</label>
                                    <input type="text" class="form-control" name="责任方" list="responsibilityList" placeholder="选择或输入自定义责任方">
                                    <datalist id="responsibilityList">
                                        <option value="NC">
                                        <option value="验货">
                                        <option value="卸车/NC共责">
                                        <option value="其他">
                                    </datalist>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">处理方式</label>
                                    <input type="text" class="form-control" name="处理方式" placeholder="处理方式">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">路由</label>
                                    <select class="form-select" name="路由">
                                        <option value="已妥投">已妥投</option>
                                        <option value="已下发">已下发</option>
                                        <option value="处理中">处理中</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">处理人</label>
                                    <input type="text" class="form-control" name="处理人" placeholder="处理人姓名">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label class="form-label">回款情况</label>
                                    <select class="form-select" name="回款情况">
                                        <option value="">--</option>
                                        <option value="√">√ 已回款</option>
                                        <option value="未回款">未回款</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveData()">
                        <i class="bi bi-check-lg"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success">
                    <h5 class="modal-title"><i class="bi bi-pencil"></i> 编辑数据</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm"></form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="updateData()">
                        <i class="bi bi-check-lg"></i> 更新
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        let editingIndex = null;
        let exceptionChart = null;
        let responsibilityChart = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            // 搜索防抖
            let searchTimer;
            document.getElementById('searchInput').addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    currentPage = 1;
                    renderTable();
                }, 300);
            });
        });

        // 显示/隐藏加载
        function showLoading() { 
            document.getElementById('loadingOverlay').style.display = 'flex'; 
        }
        function hideLoading() { 
            document.getElementById('loadingOverlay').style.display = 'none'; 
        }

        // Toast 提示
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'exclamation-circle-fill'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 加载数据
        async function loadData() {
            showLoading();
            try {
                const response = await fetch('/api/data');
                allData = await response.json();
                filteredData = [...allData];
                updateStats();
                renderTable();
                renderCharts();
            } catch (error) {
                console.error('加载失败:', error);
                showToast('数据加载失败，请刷新重试', 'error');
            } finally {
                hideLoading();
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allData.length.toLocaleString();
            
            const totalAmount = allData.reduce((sum, item) => sum + (parseFloat(item['金额']) || 0), 0);
            document.getElementById('totalAmount').textContent = totalAmount.toLocaleString('zh-CN', {maximumFractionDigits: 2});
            
            const unpaidCount = allData.filter(item => !item['回款情况'] || item['回款情况'] !== '√').length;
            document.getElementById('unpaidCount').textContent = unpaidCount;
            
            const paidCount = allData.filter(item => item['回款情况'] === '√').length;
            document.getElementById('paidCount').textContent = paidCount;
        }

        // 渲染表格
        function renderTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const pageSize = parseInt(document.getElementById('pageSize').value);
            
            // 过滤数据
            if (searchTerm) {
                filteredData = allData.filter(item => {
                    const searchFields = ['包裹号', '商品详情', '处理人', '责任方', '异常情况', '处理方式'];
                    return searchFields.some(field => 
                        String(item[field] || '').toLowerCase().includes(searchTerm)
                    );
                });
            } else {
                filteredData = [...allData];
            }
            
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map((item, idx) => {
                // 关键修复：找到该数据在 allData 中的真实索引
                const realIndex = allData.indexOf(item);
                const detail = item['商品详情'] || '';
                const isDay = item['班次'] === '白班';
                const isPaid = item['回款情况'] === '√';
                
                return `
                <tr>
                    <td>${item['日期'] || '-'}</td>
                    <td><span class="badge ${isDay ? 'badge-day' : 'badge-night'}">${item['班次'] || '-'}</span></td>
                    <td><span class="text-truncate" title="${item['包裹号'] || ''}">${item['包裹号'] || '-'}</span></td>
                    <td><span class="text-truncate" title="${detail}">${detail.substring(0, 25)}${detail.length > 25 ? '...' : ''}</span></td>
                    <td>${item['异常情况'] || '-'}</td>
                    <td><span class="amount">${item['金额'] || '-'}</span></td>
                    <td>${item['责任方'] || '-'}</td>
                    <td><span class="text-truncate">${item['处理方式'] || '-'}</span></td>
                    <td>${item['路由'] || '-'}</td>
                    <td>${item['处理人'] || '-'}</td>
                    <td><span class="badge ${isPaid ? 'badge-paid' : 'badge-unpaid'}">${isPaid ? '√' : '-'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editData(${realIndex})" title="编辑">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${realIndex})" title="删除">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
            
            document.getElementById('pageTotal').textContent = filteredData.length;
            renderPagination(filteredData.length, pageSize);
        }

        // 分页
        function renderPagination(total, pageSize) {
            const totalPages = Math.ceil(total / pageSize) || 1;
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="goPage(${currentPage - 1});return false;">‹</a>
            </li>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="goPage(${i});return false;">${i}</a>
                    </li>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                }
            }
            
            html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="goPage(${currentPage + 1});return false;">›</a>
            </li>`;
            
            pagination.innerHTML = html;
        }

        function goPage(page) {
            const totalPages = Math.ceil(filteredData.length / parseInt(document.getElementById('pageSize').value));
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        }

        // 渲染图表
        function renderCharts() {
            const colors = ['#4f46e5', '#dc2626', '#059669', '#d97706', '#8b5cf6', '#ec4899', '#0891b2', '#65a30d'];
            
            // 异常情况统计
            const exceptionCounts = {};
            allData.forEach(item => {
                const exp = item['异常情况'] || '未记录';
                exceptionCounts[exp] = (exceptionCounts[exp] || 0) + 1;
            });
            
            // 销毁旧图表
            if (exceptionChart) {
                exceptionChart.destroy();
                exceptionChart = null;
            }
            
            // 创建饼图
            const exceptionCtx = document.getElementById('exceptionChart').getContext('2d');
            exceptionChart = new Chart(exceptionCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(exceptionCounts),
                    datasets: [{
                        data: Object.values(exceptionCounts),
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                padding: 15,
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
            
            // 责任方统计
            const respCounts = {};
            allData.forEach(item => {
                const resp = item['责任方'] || '未记录';
                respCounts[resp] = (respCounts[resp] || 0) + 1;
            });
            
            // 销毁旧图表
            if (responsibilityChart) {
                responsibilityChart.destroy();
                responsibilityChart = null;
            }
            
            // 创建柱状图
            const respCtx = document.getElementById('responsibilityChart').getContext('2d');
            responsibilityChart = new Chart(respCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(respCounts),
                    datasets: [{
                        label: '数量',
                        data: Object.values(respCounts),
                        backgroundColor: '#4f46e5',
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { font: { size: 11 } },
                            grid: { color: '#f3f4f6' }
                        },
                        x: {
                            ticks: { font: { size: 11 } },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // 打开添加模态框
        function openAddModal() {
            document.getElementById('addForm').reset();
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('#addForm input[name="日期"]').value = today;
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        // 保存数据
        async function saveData() {
            const form = document.getElementById('addForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const formData = new FormData(form);
            const newData = {};
            formData.forEach((value, key) => newData[key] = value);
            
            try {
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newData)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                    showToast('数据添加成功！');
                    loadData();
                } else {
                    showToast('保存失败，请重试', 'error');
                }
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        // 编辑数据
        function editData(index) {
            const item = allData[index];
            editingIndex = index;
            
            const fields = ['日期', '班次', '包裹号', '商品详情', '异常情况', '金额', '责任方', '处理方式', '路由', '处理人', '回款情况'];
            const form = document.getElementById('editForm');
            
            form.innerHTML = `<div class="row">${fields.map(field => `
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label">${field}</label>
                        ${field === '班次' ? `
                            <select class="form-select" name="${field}">
                                <option value="白班" ${item[field] === '白班' ? 'selected' : ''}>白班</option>
                                <option value="夜班" ${item[field] === '夜班' ? 'selected' : ''}>夜班</option>
                            </select>
                        ` : field === '路由' ? `
                            <select class="form-select" name="${field}">
                                <option value="已妥投" ${item[field] === '已妥投' ? 'selected' : ''}>已妥投</option>
                                <option value="已下发" ${item[field] === '已下发' ? 'selected' : ''}>已下发</option>
                                <option value="处理中" ${item[field] === '处理中' ? 'selected' : ''}>处理中</option>
                            </select>
                        ` : field === '责任方' ? `
                            <input type="text" class="form-control" name="${field}" list="editResponsibilityList" value="${item[field] || ''}" placeholder="选择或输入自定义责任方">
                            <datalist id="editResponsibilityList">
                                <option value="NC">
                                <option value="验货">
                                <option value="卸车/NC共责">
                                <option value="其他">
                            </datalist>
                        ` : field === '回款情况' ? `
                            <select class="form-select" name="${field}">
                                <option value="" ${!item[field] ? 'selected' : ''}>--</option>
                                <option value="√" ${item[field] === '√' ? 'selected' : ''}>√ 已回款</option>
                                <option value="未回款" ${item[field] === '未回款' ? 'selected' : ''}>未回款</option>
                            </select>
                        ` : `
                            <input type="${field === '日期' ? 'date' : field === '金额' ? 'number' : 'text'}" 
                                class="form-control" name="${field}" 
                                value="${item[field] || ''}"
                                ${field === '金额' ? 'step="0.01"' : ''}>
                        `}
                    </div>
                </div>
            `).join('')}</div>`;
            
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // 更新数据
        async function updateData() {
            const form = document.getElementById('editForm');
            const formData = new FormData(form);
            const updatedData = {};
            formData.forEach((value, key) => updatedData[key] = value);
            
            try {
                const response = await fetch(`/api/data/${editingIndex}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });
                
                if (response.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    showToast('数据更新成功！');
                    loadData();
                } else {
                    showToast('更新失败，请重试', 'error');
                }
            } catch (error) {
                showToast('更新失败: ' + error.message, 'error');
            }
        }

        // 删除数据
        async function deleteData(index) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            try {
                const response = await fetch(`/api/data/${index}`, { method: 'DELETE' });
                
                if (response.ok) {
                    showToast('删除成功！');
                    loadData();
                } else {
                    showToast('删除失败，请重试', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // 导出Excel
        function exportData() {
            showToast('正在导出...');
            window.location.href = '/api/export';
        }
    </script>
</body>
</html>
