services:
  - type: web
    name: nc-account
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn cloud_app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
