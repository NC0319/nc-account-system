services:
  - type: web
    name: nc-account
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python cloud_app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: nc-account-backup
    runtime: python
    schedule: "0 2 * * *"  # 每天凌晨2点执行
    buildCommand: pip install requests
    startCommand: "curl -X POST https://nc-account-system.onrender.com/api/backup-now"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
