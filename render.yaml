services:
  - type: web
    name: nc-account
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn cloud_app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
